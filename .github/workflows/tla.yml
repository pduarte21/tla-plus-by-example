name: TLA+ Model Check

on: 
  push:
  pull_request:

permissions:
  contents: read

jobs:
  tlc:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run all models
        run: |
          echo "Starting TLA+ model checking..."
          make check-all